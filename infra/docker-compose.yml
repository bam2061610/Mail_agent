version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: oma, POSTGRES_PASSWORD: oma, POSTGRES_DB: oma }
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ../backend
    env_file: ../.env
    ports: ["8000:8000"]
    depends_on: [db, redis]
  frontend:
    build: ../frontend
    ports: ["3000:80"]
    depends_on: [backend]
volumes:
  pgdata:
